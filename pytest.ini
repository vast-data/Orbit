[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra

# Live log streaming (from your pytest.ini)
log_cli = true
log_cli_level = INFO

# Keep unexpected warnings visible but non-fatal; flip to "error" to harden.
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
