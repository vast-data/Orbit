[tox]
envlist = 
    py312
    py313
    py314
    lint
    type
    coverage
skip_missing_interpreters = true
isolated_build = true

[gh-actions]
python =
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
description = Run unit tests
passenv = 
    PYTEST_*
    CI
    VAST_*
    HOME
    USER
setenv =
    PYTHONPATH = {toxinidir}
    COVERAGE_FILE = {env:COVERAGE_FILE:{toxworkdir}/.coverage.{envname}}
deps = 
    -r{toxinidir}/requirements-testing.txt
commands = 
    pytest --durations=10 --tb=short -v {posargs}

[testenv:coverage]
description = Run tests with coverage report
deps = 
    {[testenv]deps}
    coverage[toml]
commands = 
    coverage run -m pytest {posargs}
    coverage report -m
    coverage html
    coverage xml

[testenv:lint]
description = Run code quality checks
skip_install = true
deps = 
    ruff
    black
    isort
commands = 
    ruff check vastorbit tests
    black --check vastorbit tests
    isort --check-only vastorbit tests

[testenv:format]
description = Auto-format code
skip_install = true
deps = 
    black
    isort
commands = 
    black vastorbit tests
    isort vastorbit tests

[testenv:type]
description = Run type checking
deps = 
    {[testenv]deps}
    mypy
    types-requests
commands = 
    mypy vastorbit --ignore-missing-imports

[testenv:docs]
description = Build documentation
changedir = docs
deps = 
    sphinx
    sphinx-rtd-theme
    sphinx-autodoc-typehints
commands = 
    sphinx-build -W -b html source build/html

[testenv:clean]
description = Clean build artifacts
skip_install = true
allowlist_externals = 
    rm
    find
commands = 
    rm -rf build dist *.egg-info
    find . -type d -name __pycache__ -exec rm -rf {} +
    find . -type f -name "*.pyc" -delete

[testenv:dev]
description = Development environment with all dependencies
usedevelop = true
deps = 
    {[testenv]deps}
    {[testenv:lint]deps}
    {[testenv:type]deps}
    ipython
    jupyter
commands = 
    python -c "print('Development environment ready')"

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --tb=short
    --durations=10
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests

[coverage:run]
source = vastorbit
omit = 
    */tests/*
    */conftest.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod