name: Feature Request or Bug Report
description: Report a bug or request a new feature for VAST Orbit
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue or suggest a feature!
        Please fill out the sections below to help us understand your request.

  - type: dropdown
    attributes:
      label: Issue Type
      description: What type of issue are you reporting?
      options:
        - Bug Report
        - Feature Request
        - Documentation Issue
        - Performance Issue
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of the bug or feature request.
      placeholder: Describe what you're experiencing or what you'd like to see added.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce (for bugs)
      description: If reporting a bug, provide steps to reproduce the issue.
      placeholder: |
        1. Import module...
        2. Run command...
        3. Observe error...
    validations:
      required: false

  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected outcome.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually occurred.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Environment
      description: |
        Please provide information about your environment:
      placeholder: |
        - VAST Orbit version:
        - Python version:
        - Operating System:
        - Trino version (if applicable):
      render: markdown
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or code examples that might help.
      placeholder: Any additional information that might be helpful.
    validations:
      required: false