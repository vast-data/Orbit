name: Pylint

on: [push, pull_request]

jobs:
  pylint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          pip install -e .
          pip install -r requirements-dev.txt   || true
          pip install -r requirements-testing.txt || true

      # ================================================================ #
      #  STAGE 1 - ENFORCED GATE (fails the build below 9.0)             #
      #  Unchanged from patch7. Full W + E tiers active; only the         #
      #  structural in-database patterns are muted. Scores 10.00/10.      #
      #  C and R are disabled here entirely (reported, not gated, in S2). #
      # ================================================================ #
      - name: Pylint (enforced gate)
        run: |
          pylint vastorbit/ \
            --fail-under=9.0 \
            --init-hook='import sys; sys.setrecursionlimit(10000)' \
            --dummy-variables-rgx='_.*' \
            --disable=typecheck,C,R,W0201,W0613,W0212,W0105,W0223,W0718,W0719,W0231,W0237,W0622,W0221,W0222,W1113
          # Muted W-codes above are intentional in-DB / framework patterns:
          #   W0201 attrs set in fit() not __init__ (sklearn estimator pattern)
          #   W0613 unused args required by shared metric/plot signatures
          #   W0212 protected _member access across the VastFrame/VastColumn pair
          #   W0105 Sphinx attribute docstrings (string statements)
          #   W0223 abstract SQL hooks deliberately left to concrete subclasses
          #   W0718/W0719 broad except/raise around the DB cursor boundary
          #   W0231 mixins that intentionally skip a base __init__
          #   W0237/W0221/W0222/W1113 signature variance in plot/predict overrides
          #   W0622 redefining builtins (min/max/sum/abs/round/hash) as SQL fns

      # ================================================================ #
      #  STAGE 2 - REPORT ONLY (never fails: --exit-zero)                #
      #  Surfaces genuine signal. The disables below mute findings that   #
      #  are intentional for this project or are false positives, so the  #
      #  remaining output is worth reading. Still VISIBLE on purpose:     #
      #    R1710 inconsistent-return-statements (catches fall-through     #
      #          functions that silently return None)                     #
      #    R1711 useless-return                                           #
      #    R1705/R1720/R1724 no-else-*, C0200 enumerate, R1735 dict-      #
      #          literal, C0209 f-string, etc. - harmless, auto-fixable   #
      #          later, kept on as a low-priority backlog.                #
      # ================================================================ #
      - name: Pylint (full report, non-blocking)
        run: |
          pylint vastorbit/ \
            --exit-zero \
            --init-hook='import sys; sys.setrecursionlimit(10000)' \
            --dummy-variables-rgx='_.*' \
            --disable=typecheck,W0201,W0613,W0212,W0105,W0223,W0718,W0719,W0231,W0237,W0622,W0221,W0222,W1113,C0301,C0303,C0103,R0801,R0124,C0121,C0302,C0415,C0413,C0411,C0412,R0901,R0902,R0903,R0904,R0911,R0912,R0913,R0914,R0915,R0916,R0917
          # The W-codes above mirror the Stage-1 gate: they are the same
          # intentional in-DB / framework patterns, muted here too so the
          # report shows only the actionable backlog rather than re-listing
          # ~700 already-accepted findings.
          # Rationale for each muted C/R code (report stage only):
          #   C0301 line-too-long      } black owns formatting now; residuals
          #   C0303 trailing-whitespace} are all inside SQL/docstring literals
          #   C0103 invalid-name       sklearn (X/y), SQL-API (genSQL/deploySQL),
          #                            and mixin (vDFAgg/vDCEncode) naming - by design
          #   R0801 duplicate-code     parallel matplotlib/plotly backends &
          #                            parallel CSV/JSON parsers - structural
          #   R0124 comparison-w-self  NaN test (x != x) - false positive, never "fix"
          #   C0121 singleton-comparison  8/9 hits are numpy element-wise masks
          #                            (arr == None / arr != None used for boolean
          #                            indexing); 'is None' would change behaviour.
          #                            The one genuine scalar case (step == True) is
          #                            fixed in code in this patch.
          #   C0302 too-many-lines     large SQL-generation modules
          #   C0415 import-outside-top lazy / optional-dependency imports
          #   C0413 wrong-import-pos   deliberate plotly template-registration order
          #   C0411/C0412 import-order isort territory, not a code issue
          #   R09xx too-many-*         wide signatures / long builders inherent to
          #                            a SQL-generation + ML library