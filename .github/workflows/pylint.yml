name: Pylint

on: [push, pull_request]

jobs:
  pylint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          pip install -e .
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements-testing.txt ]; then pip install -r requirements-testing.txt; fi

      # ------------------------------------------------------------------
      # STAGE 1 - ENFORCED GATE (fails the build)
      # Full W + E tiers are ON. Only structurally-intentional patterns for
      # an in-database SQL/ML library are muted (see notes at the bottom).
      # ------------------------------------------------------------------
      - name: Pylint (enforced gate)
        run: |
          pylint vastorbit/ \
            --fail-under=9.0 \
            --init-hook='import sys; sys.setrecursionlimit(10000)' \
            --dummy-variables-rgx='_.*' \
            --disable=typecheck,C,R,W0201,W0613,W0212,W0105,W0223,W0718,W0719,W0231,W0237,W0622,W0221,W0222,W1113

      # ------------------------------------------------------------------
      # STAGE 2 - REPORT ONLY (never fails; visibility into everything)
      # ------------------------------------------------------------------
      - name: Pylint (full report, non-blocking)
        if: always()
        run: |
          pylint vastorbit/ \
            --exit-zero \
            --init-hook='import sys; sys.setrecursionlimit(10000)' \
            --disable=typecheck

# ---------------------------------------------------------------------------
# Why each muted code is intentional for this project
# ---------------------------------------------------------------------------
# W0201 attribute-defined-outside-init  - fit()-time attributes (sklearn style)
# W0613 unused-argument                 - uniform/compat API signatures
# W0212 protected-access                - internal _genSQL and friends
# W0105 pointless-string-statement      - doc/section separators
# W0223 abstract-method                 - intentional abstract hierarchy
# W0718 broad-exception-caught          - defensive catches around SQL / IO
# W0719 broad-exception-raised          - same defensive policy
# W0231 super-init-not-called           - intentional mixin/MRO design
# W0237 arguments-renamed               - intentional overrides
# W0622 redefined-builtin               - SQL functions named after builtins
# W0221 arguments-differ                - intentional overrides
# W0222 signature-differs               - intentional overrides
# W1113 keyword-arg-before-vararg       - intentional API ergonomics
#
# typecheck is disabled because the analysers (scipy/numpy) trigger an astroid
# recursion crash on the C-extensions; the setrecursionlimit init-hook prevents
# that crash during AST construction.
#
# exec/eval (W0122/W0123) and the singleton global (W0603) are NOT muted here -
# they are disabled per-line at their single intentional call sites, so any
# accidental use elsewhere is still caught.
# ---------------------------------------------------------------------------