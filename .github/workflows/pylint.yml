name: Pylint
on:
  pull_request:
    branches:
      - main
      - pylint-hardening
  push:
    branches:
      - main
      - pylint-hardening
jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          pip install -e .
          pip install -r requirements-dev.txt
          pip install -r requirements-testing.txt

      # Enforced gate: the full Warning + Error tiers are ON (these catch real
      # bugs). Only structurally-intentional patterns and pure style/complexity
      # are muted. This must stay green.
      - name: Analyze code with pylint (enforced)
        run: |
          pylint --fail-under=9.0 \
            --init-hook='import sys; sys.setrecursionlimit(10000)' \
            --disable=typecheck,C,R,W0212,W0201,W0223,W0622,W0613,W0221,W0222,W0237,W0105 \
            vastorbit/

      # Visibility-only pass: enables everything (including C/R and the muted
      # structural patterns) so the full backlog is reported. Never fails the
      # build; it is purely informational for ongoing hardening.
      - name: Analyze code with pylint (report-only, non-blocking)
        continue-on-error: true
        run: |
          pylint --exit-zero \
            --init-hook='import sys; sys.setrecursionlimit(10000)' \
            --disable=typecheck \
            vastorbit/