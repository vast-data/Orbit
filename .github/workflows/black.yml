name: Black Code Formatter

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check code formatting with Black
        uses: psf/black@stable
        with:
          options: "--check --diff"
          src: "./vastorbit"